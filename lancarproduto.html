<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lançar Produto - Garimpa Preços</title>

  <link rel="stylesheet" href="style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<header>
  <div class="logo">
    <h1>⛏️ Garimpa Preços</h1>
    <span>Antes de comprar, garimpe.</span>
  </div>
</header>

<main style="width:90%;margin:40px auto;">

<h2 class="titulo">Cadastrar Produtos</h2>

<form id="formProduto">

<div id="listaProdutos">

<div class="card-produto produto-item" style="padding:20px;margin-bottom:25px;">

<h3>Produto 1</h3>

<label>Nome:</label>
<input type="text" name="nome[]" required>

<label>Descrição:</label>
<textarea name="descricao[]" required></textarea>

<label>Categoria:</label>
<input type="text" name="categoria[]" required>

<label>Loja:</label>
<input type="text" name="loja[]" required>

<label>Preço:</label>
<input type="number" name="preco[]" step="0.01" required>

<label>Preço Antigo:</label>
<input type="number" name="precoAntigo[]" step="0.01">

<label>Imagem (URL):</label>
<input type="text" name="imagem[]">

<label>Link Afiliado:</label>
<input type="text" name="afiliado[]">

<label>
<input type="checkbox" name="destaque[]">
Produto em destaque
</label>

<button
type="button"
class="removerProduto btnOferta"
style="background:#dc3545;margin-top:15px;">
🗑️ Remover Produto
</button>

</div>

</div>

<div style="display:flex;gap:15px;flex-wrap:wrap;margin-top:20px;">

<button
type="button"
id="addProduto"
class="btnOferta">

➕ Adicionar Produto

</button>

<button
type="submit"
class="btnOferta">

💾 Salvar Todos os Produtos

</button>

</div>

</form>

</main>

<footer>
<p>© 2026 Garimpa Preços</p>
</footer>

<script>

let contador = 1;

document.getElementById("addProduto").addEventListener("click", () => {

    contador++;

    const modelo = document.querySelector(".produto-item");

    const novo = modelo.cloneNode(true);

    novo.querySelector("h3").textContent = "Produto " + contador;

    novo.querySelectorAll("input, textarea").forEach(campo => {

        if(campo.type==="checkbox"){
            campo.checked=false;
        }else{
            campo.value="";
        }

    });

    document.getElementById("listaProdutos").appendChild(novo);

});

document.addEventListener("click",function(e){

    if(e.target.classList.contains("removerProduto")){

        const produtos=document.querySelectorAll(".produto-item");

        if(produtos.length>1){

            e.target.closest(".produto-item").remove();

        }else{

            alert("É necessário manter pelo menos um produto.");

        }

    }

});

</script>

<script type="module" src="cadastrar.js"></script>

</body>
</html>
