<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lançar Produto - Garimpa Preços</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>


<body>


<header>

<div class="logo">

<h1>⛏️ Garimpa Preços</h1>

<span>Antes de comprar, garimpe.</span>

</div>

</header>



<main style="width:90%;margin:40px auto;">


<h2 class="titulo">
Cadastrar novo produto
</h2>



<form id="formProduto" class="card-produto" style="padding:20px;">


<label>Nome:</label>

<input type="text" id="nome" required>



<label>Descrição:</label>

<textarea id="descricao" required></textarea>



<label>Categoria:</label>

<input type="text" id="categoria" required>



<label>Loja:</label>

<input type="text" id="loja" required>



<label>Preço:</label>

<input type="number" id="preco" step="0.01" required>



<label>Preço Antigo:</label>

<input type="number" id="precoAntigo" step="0.01">



<label>Imagem (URL):</label>

<input type="text" id="imagem">



<label>Link Afiliado:</label>

<input type="text" id="afiliado">



<label>

<input type="checkbox" id="destaque">

 Produto em destaque

</label>



<br>


<button type="submit" class="btnOferta">

Salvar Produto

</button>


</form>


</main>



<footer>

<p>
© 2026 Garimpa Preços
</p>

</footer>



<script type="module" src="cadastrar.js"></script>


</body>

</html>
