<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Produtos - Garimpa Preços</title>

    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="img/Favicon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <header>
        <div class="logo">
            <h1>⛏️ Garimpa Preços</h1>
            <span>Antes de comprar, garimpe.</span>
        </div>
    </header>

    <main>

        <h2 class="titulo">Cadastrar Produtos</h2>

        <form id="formProduto">

            <div id="listaProdutos">

                <div class="produto-item">

                    <h3>Produto 1</h3>

                    <div class="campo">
                        <label>Nome</label>
                        <input type="text" name="nome[]" required>
                    </div>

                    <div class="campo">
                        <label>Categoria</label>
                        <input type="text" name="categoria[]" required>
                    </div>

                    <div class="campo">
                        <label>Loja</label>
                        <input type="text" name="loja[]" required>
                    </div>

                    <div class="campo">
                        <label>Preço</label>
                        <input type="number" name="preco[]" step="0.01" required>
                    </div>

                    <div class="campo">
                        <label>Preço Antigo</label>
                        <input type="number" name="precoAntigo[]" step="0.01">
                    </div>

                    <div class="campo">
                        <label>Imagem (URL)</label>
                        <input type="text" name="imagem[]">
                    </div>

                    <div class="campo campo-full">
                        <label>Descrição</label>
                        <textarea name="descricao[]" required></textarea>
                    </div>

                    <div class="campo campo-full">
                        <label>Link Afiliado</label>
                        <input type="text" name="afiliado[]">
                    </div>

                    <div class="campo campo-full">
                        <label style="display:flex;align-items:center;gap:10px;">
                            <input type="checkbox" name="destaque[]">
                            Produto em destaque
                        </label>
                    </div>

                    <div class="acoes">
                        <button type="button" class="btnOferta removerProduto">
                            Remover Produto
                        </button>
                    </div>

                </div>

            </div>

            <br>

            <button type="button" class="btnOferta" id="addProduto">
                Adicionar Produto
            </button>

            <br><br>

            <button type="submit" class="btnOferta">
                Salvar Todos os Produtos
            </button>

        </form>

    </main>

    <footer>
        <p>© 2026 Garimpa Preços</p>
    </footer>

    <script>

        let contador = 1;

        document.getElementById("addProduto").addEventListener("click", () => {

            contador++;

            const modelo = document.querySelector(".produto-item");

            const novo = modelo.cloneNode(true);

            novo.querySelector("h3").textContent = "Produto " + contador;

            novo.querySelectorAll("input").forEach(campo => {

                if (campo.type == "checkbox") {

                    campo.checked = false;

                } else {

                    campo.value = "";

                }

            });

            novo.querySelectorAll("textarea").forEach(campo => campo.value = "");

            document.getElementById("listaProdutos").appendChild(novo);

        });

        document.addEventListener("click", function (e) {

            if (e.target.classList.contains("removerProduto")) {

                const produtos = document.querySelectorAll(".produto-item");

                if (produtos.length > 1) {

                    e.target.closest(".produto-item").remove();

                } else {

                    alert("É necessário manter pelo menos um produto.");

                }

            }

        });

    </script>

    <script type="module" src="cadastrar.js"></script>

</body>

</html>
